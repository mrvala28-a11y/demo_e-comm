<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - ModernShop</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        accent: '#F59E0B',
                        background: '#F8FAFC',
                        dark: '#1E293B',
                        'dark-bg': '#0F172A',
                        'dark-card': '#1E293B',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-poppins bg-background text-dark dark:bg-dark-bg dark:text-white transition-colors duration-300">
    
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-dark-card/80 backdrop-blur-md shadow-sm z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                        <i class="fas fa-shopping-bag text-white text-lg"></i>
                    </div>
                    <span class="text-2xl font-bold text-primary">ModernShop</span>
                </a>
                <div class="flex items-center gap-4">
                    <button id="dark-mode-toggle" class="p-2.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                        <i class="fas fa-moon text-gray-700 dark:text-yellow-400"></i>
                    </button>
                    <a href="checkout.html" class="relative p-2.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                        <i class="fas fa-shopping-cart text-gray-700 dark:text-gray-200"></i>
                        <span id="cart-count" class="absolute -top-1 -right-1 w-5 h-5 bg-accent text-white text-xs rounded-full flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Wishlist Content -->
    <main class="pt-24 pb-16 min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-dark dark:text-white">My Wishlist</h1>
                <span id="wishlist-count-text" class="text-gray-500 dark:text-gray-400">0 items</span>
            </div>

            <!-- Wishlist Grid -->
            <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Wishlist items will be rendered here -->
            </div>

            <!-- Empty Wishlist -->
            <div id="empty-wishlist" class="hidden text-center py-16">
                <i class="fas fa-heart text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-500 dark:text-gray-400 mb-2">Your wishlist is empty</h2>
                <p class="text-gray-400 dark:text-gray-500 mb-6">Save items you love by clicking the heart icon</p>
                <a href="index.html" class="px-6 py-3 bg-primary text-white rounded-full hover:bg-primary/90 transition-colors">
                    Start Shopping
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark dark:bg-black text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-400">
            <p>&copy; 2024 ModernShop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Initialize wishlist page
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            renderWishlist();
            updateCartCount();
        });

        function renderWishlist() {
            const container = document.getElementById('wishlist-grid');
            const emptyState = document.getElementById('empty-wishlist');
            const countText = document.getElementById('wishlist-count-text');
            
            const wishlist = getWishlist();
            
            countText.textContent = `${wishlist.length} item${wishlist.length !== 1 ? 's' : ''}`;
            
            if (wishlist.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            container.innerHTML = wishlist.map(item => {
                const discountedPrice = (item.price - (item.price * item.discountPercentage / 100)).toFixed(2);
                return `
                    <div class="product-card" data-product-id="${item.id}">
                        <div class="image-container">
                            <img src="${item.thumbnail}" alt="${item.title}" class="product-image">
                            <button onclick="removeFromWishlist(${item.id})" class="absolute top-3 right-3 w-10 h-10 bg-white dark:bg-gray-800 rounded-full flex items-center justify-center shadow-lg hover:bg-red-500 hover:text-white transition-colors">
                                <i class="fas fa-heart text-red-500"></i>
                            </button>
                        </div>
                        <div class="card-content">
                            <p class="category">${item.category}</p>
                            <h3 class="title">${item.title}</h3>
                            <div class="price">
                                <span class="current">$${discountedPrice}</span>
                                <span class="original">$${item.price}</span>
                            </div>
                            <button onclick="addToCart(${item.id}); removeFromWishlist(${item.id});" class="add-to-cart">
                                <i class="fas fa-shopping-cart mr-2"></i>Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeFromWishlist(productId) {
            const wishlist = getWishlist();
            const item = wishlist.find(p => p.id === productId);
            
            if (item) {
                removeWishlistItem(productId);
                renderWishlist();
                updateWishlistCount();
                showToast(`${item.title} removed from wishlist`, 'info');
            }
        }
    </script>
</body>
</html>
